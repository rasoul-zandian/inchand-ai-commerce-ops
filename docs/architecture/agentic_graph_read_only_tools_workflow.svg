  <text x="65" y="622" class="bullet">1) Delivered in Inchand -&gt; skip Iran Post</text>
  <text x="65" y="650" class="bullet">2) Shipment without tracking -&gt; optional tracking request</text>
  <text x="65" y="678" class="bullet">3) Valid Iran Post -&gt; include clean status + ack</text>
